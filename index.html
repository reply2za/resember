<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResEmber</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: #f5f5f5;
            min-height: 100vh;
            overflow: hidden;
        }

        canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px;
            text-align: center;
        }

        .logo {
            font-size: 64px;
            font-weight: 800;
            letter-spacing: -2px;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #ff6b35, #f7c59f, #ff6b35);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 4s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .tagline {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.45);
            font-weight: 400;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 64px;
        }

        .product-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 107, 53, 0.15);
            border-radius: 16px;
            padding: 32px 40px;
            text-decoration: none;
            color: inherit;
            transition: all 0.35s ease;
            max-width: 380px;
            width: 100%;
            display: block;
        }

        .product-card:hover {
            background: rgba(255, 107, 53, 0.08);
            border-color: rgba(255, 107, 53, 0.35);
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(255, 107, 53, 0.1);
        }

        .product-icon { font-size: 36px; margin-bottom: 16px; }

        .product-name {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #fff;
        }

        .product-desc {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.5;
        }

        .product-arrow {
            margin-top: 16px;
            font-size: 14px;
            color: #ff6b35;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .product-card:hover .product-arrow { opacity: 1; }

        @media (max-width: 480px) {
            .logo { font-size: 44px; }
            .tagline { font-size: 14px; letter-spacing: 2px; margin-bottom: 48px; }
            .product-card { padding: 24px; }
        }
    </style>
</head>
<body>
    <canvas id="embers"></canvas>
    <div class="content">
        <h1 class="logo">ResEmber</h1>
        <p class="tagline">Software that endures</p>

        <a href="https://markdownpdf.resember.com" class="product-card">
            <div class="product-icon">📄</div>
            <div class="product-name">Markdown PDF</div>
            <div class="product-desc">Convert Markdown to beautifully formatted PDFs. Fast, clean, and simple.</div>
            <div class="product-arrow">View →</div>
        </a>
    </div>

    <script>
        const canvas = document.getElementById('embers');
        const ctx = canvas.getContext('2d');
        let w, h, particles = [];

        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * w;
                this.y = h + 10;
                this.vx = (Math.random() - 0.5) * 0.6;
                this.vy = -(Math.random() * 1.2 + 0.3);
                this.size = Math.random() * 3 + 1;
                this.life = 1;
                this.decay = Math.random() * 0.003 + 0.002;
                this.hue = Math.random() * 30 + 15;
            }
            update() {
                this.x += this.vx + Math.sin(this.y * 0.01) * 0.2;
                this.y += this.vy;
                this.life -= this.decay;
                this.size *= 0.999;
                if (this.life <= 0 || this.y < -10) this.reset();
            }
            draw() {
                const alpha = this.life * 0.6;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 90%, 55%, ${alpha})`;
                ctx.fill();
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 2.5, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 90%, 55%, ${alpha * 0.15})`;
                ctx.fill();
            }
        }

        for (let i = 0; i < 80; i++) {
            const p = new Particle();
            p.y = Math.random() * h;
            p.life = Math.random();
            particles.push(p);
        }

        function animate() {
            ctx.fillStyle = 'rgba(10, 10, 10, 0.12)';
            ctx.fillRect(0, 0, w, h);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
